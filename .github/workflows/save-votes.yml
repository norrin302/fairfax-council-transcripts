name: Save Votes Data

on:
  repository_dispatch:
    types: [save-votes-data]

  workflow_dispatch:
    inputs:
      meeting_id:
        description: 'Meeting ID (e.g. apr-14-2026)'
        required: true
        type: string
      votes_json_base64:
        description: 'Votes JSON as base64 string'
        required: true
        type: string

permissions:
  contents: write

jobs:
  save-votes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Save votes data
        run: |
          MEETING_ID="${{ github.event.inputs.meeting_id || github.event.client_payload.meeting_id }}"
          echo "=== MEETING_ID: $MEETING_ID ==="
          VOTES_JSON_B64="${{ github.event.inputs.votes_json_base64 || github.event.client_payload.votes_json_base64 }}"
          echo "=== b64 length: ${#VOTES_JSON_B64} ==="
          echo "$VOTES_JSON_B64" | base64 -d > votes_in.json
          echo "=== file size: $(stat -c%s votes_in.json) ==="
          cat votes_in.json
          echo "=== END ==="
          ls -la scripts/
          python3 scripts/save_votes.py 2>&1 || echo "PYTHON_FAILED"
          echo "=== done ==="

      - name: Commit and push
        run: |
          MEETING_ID="${{ github.event.inputs.meeting_id || github.event.client_payload.meeting_id }}"
          git add docs/votes/$MEETING_ID.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Add/update votes data: $MEETING_ID"
          git push origin main