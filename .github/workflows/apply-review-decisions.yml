name: Apply Review Decisions

on:
  repository_dispatch:
    types: [apply-review-decisions]

  workflow_dispatch:
    inputs:
      meeting_id:
        description: 'Meeting ID (e.g. apr-14-2026)'
        required: true
        type: string
      decisions_json_base64:
        description: 'Decisions JSON as base64 string'
        required: true
        type: string

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode decisions JSON
        run: |
          echo "${{ github.event.inputs.decisions_json_base64 || github.event.client_payload.decisions_json_base64 }}" | base64 -d > decisions.json
          echo "Decisions: $(jq length decisions.json)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run apply script
        run: |
          MEETING_ID="${{ github.event.inputs.meeting_id || github.event.client_payload.meeting_id }}"
          python3 scripts/apply_review_decisions.py \
            "$MEETING_ID" \
            --decisions decisions.json

      - name: Push changes
        run: |
          git add -A
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Apply review decisions: $MEETING_ID"
          git push origin main

      - name: Done
        run: |
          echo "Done — https://norrin302.github.io/fairfax-council-transcripts/transcripts/$MEETING_ID.html"