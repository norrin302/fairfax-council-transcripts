name: Publish Meeting

on:
  repository_dispatch:
    types: [repository_dispatch]
  workflow_dispatch:
    inputs:
      meeting_id:
        description: 'Meeting ID (e.g. apr-14-2026)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Publish meeting
        run: |
          MEETING_ID="${{ github.event.inputs.meeting_id || github.event.client_payload.meeting_id }}"
          python3 scripts/publish_structured_meeting.py "$MEETING_ID" --structured transcripts_structured/"$MEETING_ID".json

      - name: Push published docs
        run: |
          git config user.email "fairfax-apply@github-actions.dev"
          git config user.name "fairfax-apply workflow"
          git add docs/transcripts/ docs/js/search-index.js
          git diff --cached --quiet && echo "No changes to push" || git commit -m "publish: $MEETING_ID updated transcript"
          git push origin main

      - name: Done
        run: |
          MEETING_ID="${{ github.event.inputs.meeting_id || github.event.client_payload.meeting_id }}"
          echo "Done — https://norrin302.github.io/fairfax-council-transcripts/transcripts/$MEETING_ID.html"